name: Monitor Anubis

on:
  schedule:
    - cron: '0 8 * * *'   # Corre cada dia a las 8am UTC
  push:
    branches: [master]
    paths-ignore:
      - 'historial.json'  # El commit del historial no re-dispara el workflow
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest

      - name: Correr tests
        run: pytest test_monitor.py -v

  buscar:
    name: Buscar a Anubis
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write   # Necesario para hacer push del historial.json

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr monitor
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python monitor_github.py

      - name: Guardar historial en el repositorio
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historial.json || true
          git diff --staged --quiet || git commit -m "chore: actualizar historial de busqueda [skip ci]"
          git push || true

      - name: Guardar resultados como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-${{ github.run_number }}
          path: resultados.txt
          retention-days: 90
